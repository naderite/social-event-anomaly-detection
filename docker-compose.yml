services:
  kafka:
    image: apache/kafka:3.9.2
    container_name: social-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  postgres:
    image: postgres:16
    container_name: social-postgres
    environment:
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_DB: social_events
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social -d social_events"]
      interval: 10s
      timeout: 5s
      retries: 12

  spark:
    image: python:3.11-slim
    container_name: social-spark
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SPARK_MODE: client
      TARGET_KEYWORD: manifestation
      FILTER_LANGUAGE: fr
      WINDOW_DURATION_SECONDS: 15
      WATERMARK_SECONDS: 30
      BASELINE_WINDOWS: 6
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: social-posts
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: social_events
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
    volumes:
      - ./spark_app:/app/spark_app
    command:
      - /bin/bash
      - -lc
      - >
        for i in $(seq 1 60); do
          (echo > /dev/tcp/kafka/9092) >/dev/null 2>&1 && break;
          sleep 2;
        done &&
        apt-get update &&
        apt-get install -y --no-install-recommends default-jre-headless &&
        pip install --no-cache-dir psycopg2-binary==2.9.9 &&
        pip install --no-cache-dir pyspark==4.0.1 &&
        python /app/spark_app/job.py

  producer:
    image: python:3.11-slim
    container_name: social-producer
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: social-posts
      TARGET_KEYWORD: manifestation
      RUN_SECONDS: 125
      POSTS_PER_SECOND: 4
      SPIKE_START_AFTER_SECONDS: 75
      SPIKE_DURATION_SECONDS: 15
      SPIKE_MULTIPLIER: 6
      NOISE_SPIKE_LANGUAGE: en
    volumes:
      - ./producer:/app/producer
      - ./data:/app/data
    command:
      - /bin/bash
      - -lc
      - >
        for i in $(seq 1 60); do
          (echo > /dev/tcp/kafka/9092) >/dev/null 2>&1 && break;
          sleep 2;
        done &&
        pip install --no-cache-dir kafka-python==2.0.2 &&
        python /app/producer/run.py

volumes:
  postgres_data:
